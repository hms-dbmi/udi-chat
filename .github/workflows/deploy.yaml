name: Deploy Quasar App to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
      - name: Install Dependencies
        run: yarn
      - name: Build
        run: yarn build
        env:
          VITE_BENCHMARK_ENDPOINT_URL: ${{ vars.VITE_BENCHMARK_ENDPOINT_URL }}
          VITE_DATA_PACKAGE_PATH: ${{ vars.VITE_DATA_PACKAGE_PATH }}
          VITE_ENABLE_CUSTOM_API_KEY: ${{ vars.VITE_ENABLE_CUSTOM_API_KEY }}
          VITE_PRODUCTION: ${{ vars.VITE_PRODUCTION }}
          VITE_CUSTOM_API_KEY_VALIDATION_URL: ${{ vars.VITE_CUSTOM_API_KEY_VALIDATION_URL }}
          VITE_LLM_API_BASE_URL: ${{ vars.VITE_LLM_API_BASE_URL }}
          VITE_LLM_API_PORT: ${{ vars.VITE_LLM_API_PORT }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/spa

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
